<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Weak Botnet</title>
  <style>
    :root {
      --bg-dark: #0d0d0d;
      --bg-light: #f5f5f5;
      --text-dark: #00ffcc;
      --text-light: #222;
      --border-dark: #00ffcc88;
      --border-light: #22222244;
    }

    [data-theme="dark"] {
      --bg: var(--bg-dark);
      --text: var(--text-dark);
      --border: var(--border-dark);
    }

    [data-theme="light"] {
      --bg: var(--bg-light);
      --text: var(--text-light);
      --border: var(--border-light);
    }

    * {
      box-sizing: border-box;
      cursor: none;
    }

    body {
      margin: 0;
      height: 100vh;
      background: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      transition: background 0.3s, color 0.3s;
      overflow: hidden;
    }

    .message {
      font-size: 2.5rem;
      text-align: center;
      padding: 2rem 3rem;
      border: 2px solid var(--border);
      border-radius: 1.5rem;
      box-shadow: 0 0 20px var(--border);
      animation: glow 2s ease-in-out infinite alternate;
    }

    @keyframes glow {
      from {
        box-shadow: 0 0 10px var(--border);
      }
      to {
        box-shadow: 0 0 25px var(--border);
      }
    }

    .toggle {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: 2px solid var(--border);
      border-radius: 25px;
      padding: 0.5rem 1rem;
      color: var(--text);
      font-size: 1rem;
      cursor: pointer;
      z-index: 2;
      box-shadow: 0 0 10px var(--border);
      transition: background 0.3s, color 0.3s;
    }

    /* Glowing cursor dot */
    .cursor-dot {
      position: fixed;
      width: 14px;
      height: 14px;
      background: var(--text);
      border-radius: 50%;
      pointer-events: none;
      box-shadow: 0 0 10px var(--text), 0 0 20px var(--text);
      transform: translate(-50%, -50%);
      z-index: 9999;
    }
  </style>
</head>
<body>
  <button class="toggle" onclick="toggleTheme()">Toggle Mode</button>
  <div class="message">
    If you can see this,<br><strong>your net is ahh twin💔🥀.</strong>
  </div>
  <div class="cursor-dot" id="cursorDot"></div>

  <script>
    const root = document.documentElement;
    function toggleTheme() {
      const current = root.getAttribute('data-theme');
      root.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    // Cursor dot follow
    const cursorDot = document.getElementById('cursorDot');
    document.addEventListener('mousemove', (e) => {
      cursorDot.style.left = e.clientX + 'px';
      cursorDot.style.top = e.clientY + 'px';
    });
  </script>
</body>
</html>
